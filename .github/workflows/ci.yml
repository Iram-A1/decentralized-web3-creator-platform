name: Solidity CI & AWS Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Hardhat
        run: npm install --save-dev hardhat

      - name: Verify contracts exist
        run: |
          echo "Checking contracts..."
          ls contracts/
          echo "All contracts found!"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy frontend to AWS S3
        run: |
          aws s3 cp index.html s3://web3-creator-platform-frontend/index.html
          echo "Frontend deployed to S3 successfully!"
